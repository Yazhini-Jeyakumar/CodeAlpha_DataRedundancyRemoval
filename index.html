<!DOCTYPE html>
<html>
<head>
    <title>Data Redundancy Removal System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>☁ Data Redundancy Removal System</h1>

    <div class="card">

        <form method="POST">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="Email Address" required>

            <input type="text" name="phone" placeholder="Phone Number" required>

            <button type="submit">Add Record</button>

        </form>

        {% if message %}
        <div class="message">
            {{ message }}
        </div>
        {% endif %}

    </div>

    <div class="card">

        <form method="GET">

            <input
                type="text"
                name="search"
                value="{{ search }}"
                placeholder="Search by Name or Email"
            >

            <button type="submit">
                Search
            </button>

        </form>

    </div>

    <div class="actions">
        <a href="/export">📥 Export CSV</a>
    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>

        {% for row in records %}

        <tr>

            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>

            <td>
                <a
                class="delete-btn"
                href="/delete/{{ row[0] }}">
                Delete
                </a>
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
